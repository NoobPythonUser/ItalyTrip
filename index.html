<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');

  html{font-size:17px;} /* global scale */

  *{box-sizing:border-box;margin:0;padding:0}

  body{
    font-family:'DM Sans',sans-serif;
    background:var(--color-background-tertiary);
    color:var(--color-text-primary);
    font-size:16px;
    line-height:1.5;
  }

  .wrap{max-width:700px;margin:0 auto;padding:1.5rem 1rem 3rem}

  .hero{text-align:center;padding:2rem 0 1.5rem}
  .hero-flag{font-size:36px;margin-bottom:10px}
  .hero h1{
    font-family:'Playfair Display',serif;
    font-size:34px;
    font-weight:600;
    letter-spacing:-.5px;
    margin-bottom:6px
  }
  .hero p{
    font-size:14px;
    color:var(--color-text-secondary);
    letter-spacing:.5px;
    text-transform:uppercase
  }

  .stat-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:1.5rem
  }
  .stat{
    background:var(--color-background-primary);
    border:0.5px solid var(--color-border-tertiary);
    border-radius:var(--border-radius-md);
    padding:1rem;
    text-align:center
  }
  .stat-num{font-size:26px;font-weight:500;line-height:1}
  .stat-lbl{
    font-size:12px;
    color:var(--color-text-secondary);
    margin-top:6px;
    text-transform:uppercase;
    letter-spacing:.4px
  }

  .tabs{display:flex;gap:6px;margin-bottom:1.2rem;flex-wrap:wrap}
  .tab{
    padding:8px 16px;
    border-radius:20px;
    font-size:14px;
    border:0.5px solid var(--color-border-secondary);
    background:var(--color-background-primary);
    color:var(--color-text-secondary);
    cursor:pointer;
    transition:all .15s
  }
  .tab.active{
    background:var(--color-text-primary);
    color:var(--color-background-primary);
    border-color:var(--color-text-primary)
  }

  .section{display:none}
  .section.visible{display:block}

  .day-card{
    background:var(--color-background-primary);
    border:0.5px solid var(--color-border-tertiary);
    border-radius:var(--border-radius-lg);
    margin-bottom:12px;
    overflow:hidden
  }

  .day-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 16px; /* bigger tap */
    border-bottom:0.5px solid var(--color-border-tertiary);
    cursor:pointer;
    justify-content:space-between
  }

  .day-meta{display:flex;align-items:center;gap:10px}

  .city-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .rome-dot{background:#D85A30}
  .florence-dot{background:#1D9E75}
  .milan-dot{background:#378ADD}

  .day-title{font-size:15px;font-weight:500}
  .day-date{font-size:13px;color:var(--color-text-secondary)}

  .chevron{font-size:14px;color:var(--color-text-tertiary);transition:transform .2s}
  .chevron.open{transform:rotate(180deg)}

  .day-body{padding:14px 16px;display:none}
  .day-body.open{display:block}

  .activity-list{list-style:none}
  .activity-item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:6px 0;
    font-size:14px;
    border-bottom:0.5px solid var(--color-border-tertiary)
  }
  .activity-item:last-child{border-bottom:none}

  .act-icon{font-size:15px;width:22px;flex-shrink:0;margin-top:2px}
  .act-text{color:var(--color-text-primary);line-height:1.5}

  .badge{
    display:inline-block;
    font-size:11px;
    padding:3px 8px;
    border-radius:10px;
    font-weight:500;
    margin-left:6px;
    vertical-align:middle
  }

  .flight-card{
    background:var(--color-background-primary);
    border:0.5px solid var(--color-border-tertiary);
    border-radius:var(--border-radius-lg);
    padding:16px;
    margin-bottom:10px
  }

  .flight-city{font-size:20px;font-weight:500}
  .flight-info{font-size:12px;color:var(--color-text-secondary);margin-top:8px}

  .hotel-card{
    background:var(--color-background-primary);
    border:0.5px solid var(--color-border-tertiary);
    border-radius:var(--border-radius-lg);
    padding:16px;
    margin-bottom:10px;
    display:flex;
    gap:12px
  }

  .hotel-name{font-size:16px;font-weight:500;margin-bottom:4px}
  .hotel-addr{font-size:13px;color:var(--color-text-secondary);line-height:1.4}

  .where-now{
    background:linear-gradient(135deg,#FAECE7,#FAEEDA);
    border:1px solid #F0997B;
    border-radius:var(--border-radius-lg);
    padding:16px;
    margin-bottom:1.2rem;
    display:flex;
    align-items:center;
    gap:12px
  }

  .where-text .where-val{
    font-size:18px;
    font-weight:500;
    color:#3C2A1B
  }

</style>

<link rel="apple-touch-icon" href="/apple-touch-icon.png">
