function parseLocalTs(str) {
  const [d, t] = str.split("T");
  const [y, mo, day] = d.split("-").map(Number);
  const [h, m] = t.split(":").map(Number);
  return new Date(y, mo - 1, day, h, m);
}

function formatDt(dt) {
  return dt.toLocaleString("en-IN", { weekday:"short", day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" });
}

function cityClass(c) {
  if (c === "Rome") return "city-rome";
  if (c === "Florence") return "city-florence";
  if (c === "Milan") return "city-milan";
  if (c === "travel") return "city-travel";
  return "city-mumbai";
}

function cityIcon(c) {
  if (c === "Rome") return "IT · Rome";
  if (c === "Florence") return "IT · Florence";
  if (c === "Milan") return "IT · Milan";
  if (c === "travel") return "In transit";
  return "IN · Mumbai";
}

function nextEvent(idx) {
  for (let i = idx + 1; i < events.length; i++) {
    return events[i];
  }
  return null;
}

function lookup() {
  const inp = document.getElementById("dt").value;
  if (!inp) return;
  const sel = parseLocalTs(inp);
  const res = document.getElementById("result");

  let matchIdx = -1;
  for (let i = 0; i < events.length; i++) {
    const ets = parseLocalTs(events[i].ts);
    if (ets <= sel) matchIdx = i;
    else break;
  }

  if (matchIdx === -1) {
    res.innerHTML = `<div class="card"><p class="empty">Your trip hasn't started yet. Departure from Mumbai is 23 Apr at 2:50 AM.</p></div>`;
    return;
  }

  const ev = events[matchIdx];
  const next = nextEvent(matchIdx);
  let html = "";

  if (ev.type === "flight" || ev.type === "train") {
    const icon = ev.type === "flight" ? "✈" : "🚆";
    const label = ev.type === "flight" ? "Flight" : "Train";
    html = `
      <div class="card">
        <span class="city-badge city-travel">${icon} In transit</span>
        <div class="travel-route">${ev.from} → ${ev.to}</div>
        <p class="activity-time">${ev.dep} departure · ${ev.arr} arrival</p>
        <hr class="divider">
        <div class="meta-row">
          <div class="meta-item"><div class="meta-label">${label}</div><div class="meta-val">${ev.flight || ev.train}</div></div>
          ${ev.pnr ? `<div class="meta-item"><div class="meta-label">PNR</div><div class="meta-val">${ev.pnr}</div></div>` : ""}
        </div>
        ${next ? `<div class="next-hint">Next: <strong>${next.type === "flight" || next.type === "train" ? (next.from + " → " + next.to) : next.place}</strong></div>` : ""}
      </div>`;
  } else {
    html = `
      <div class="card">
        <span class="city-badge ${cityClass(ev.city)}">${cityIcon(ev.city)}</span>
        <div class="activity-name">${ev.place}</div>
        <p class="activity-time">${formatDt(parseLocalTs(ev.ts))}</p>
        ${ev.note ? `<hr class="divider"><div style="font-size:12px;color:var(--color-text-secondary)">${ev.note}</div>` : ""}
        ${ev.meal ? `<div class="meal-pill">Meal · ${ev.meal}</div>` : ""}
        ${next ? `<div class="next-hint">Next: <strong>${next.type === "flight" || next.type === "train" ? ("Transit: " + next.from + " → " + next.to) : next.place}</strong></div>` : ""}
      </div>`;
  }

  res.innerHTML = html;
}

lookup();
